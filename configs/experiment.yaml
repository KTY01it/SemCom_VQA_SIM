project:
  name: semcom_vqa_sim
  seed: 0

data:
  root: /home/cislab301b/Dung/Data/GQA/subsets/gqa_comm_v2
  samples_file: samples.jsonl
  bbox_file: bbox_packets.jsonl
  sg_file: sg_triplets.jsonl
  object_vocab_file: object_vocab.json
  relation_vocab_file: relation_vocab.json
  answer_vocab_file: answer_vocab.json

image:
  mode: raw_float32
  height: 480
  width: 320
  channels: 3
  bits_per_value: 32

source:
  mode: random_bits        # random_bits | sg_packet | bbox_packet
  num_bits: 4096
  packet_size_bits: 512

packet:
  crc16_enabled: true
  crc_bits: 16
  sg_payload_bits: 48
  bbox_payload_bits: 80

modulation:
  scheme: bpsk
  bit0_symbol: -1.0
  bit1_symbol: 1.0

channel:
  type: awgn               # awgn | rayleigh
  snr_db_list: [-4, -2, 0, 2, 4, 6, 8, 10, 12, 14, 16]
  perfect_csi: true

latency:
  bandwidth_hz: 100000
  use_shannon_like_rate: true

  # Paper-style compute latency approximation
  device_tflops: 1.33
  bbox_extraction_tflops: 0.44
  sg_generation_tflops: 0.02

  # Lightweight placeholders
  question_parser_ms: 0.0
  answer_reasoning_ms: 0.0
  ranking_ms: 0.1
  channel_decode_ms: 0.0

experiment:
  answerability_max_samples: 500
  answerability_snr_db: 8.0
  ldpc_max_samples: 300

  channels:
    - awgn
    - rayleigh

  ranking_methods:
    - original
    - do
    - go

  ldpc_ranking_methods:
    - go

  n_top_list:
    - 3
    - 6
    - 9
    - 12
    - 15
    - 18

  ldpc_n_top_list:
    - 3
    - 6
    - 9
    - 12

  ldpc_snr_db_list:
    - 4.0
    - 6.0
    - 8.0
    - 10.0
    - 12.0

  coding_modes:
    - uncoded
    - ldpc_like

ldpc:
  enabled: false
  code_rate: 0.5
  block_length: 1024

  k: 256
  m: 256
  col_weight: 3
  max_iter: 30
  seed: 123

output:
  dir: results
